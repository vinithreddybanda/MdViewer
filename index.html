<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index</title>
    <script>
        const branchButton = document.getElementById('branchButton');
        const branchMenu = document.getElementById('branchMenu');
        const branches = [];

        // Function to fetch branches from the GitHub API
        async function fetchBranches() {
            const repo = window.location.pathname.split('/').slice(1, 3).join('/'); // Get owner/repo
            const response = await fetch(`https://api.github.com/repos/${repo}/branches`);
            const data = await response.json();
            return data.map(branch => branch.name);
        }

        async function populateBranchMenu() {
            branches.push(...await fetchBranches());
            branches.forEach(branch => {
                const option = document.createElement('option');
                option.value = branch;
                option.innerText = branch;
                branchMenu.appendChild(option);
            });
        }

        branchButton.addEventListener('click', () => {
            branchMenu.classList.toggle('hidden');
        });

        branchMenu.addEventListener('change', (event) => {
            const selectedBranch = event.target.value;
            localStorage.setItem('selectedBranch', selectedBranch);
            // Update API fetches
            getApiBase(selectedBranch);
            refreshDirectories(selectedBranch);
        });

        function getApiBase(branch) {
            // Modify the base API URL to include the selected branch
            const baseUrl = `https://api.github.com/repos/${repo}/contents?ref=${branch}`;
            return baseUrl;
        }

        // Call this function to refresh directory/files based on the selected branch
        function refreshDirectories(branch) {
            // Your logic to refresh directories/files fetch based on the branch.
        }

        async function downloadMarkdown(url) {
            const selectedBranch = localStorage.getItem('selectedBranch') || 'main';
            const finalUrl = url + `?ref=${selectedBranch}`;
            const response = await fetch(finalUrl);
            // Handle the downloaded markdown
        }

        // Error handling
        async function handleError() {
            try {
                // Your fetching logic that may throw an error
            } catch (error) {
                // Fallback to default branch 'main' if an error occurs.
                getApiBase('main');
            }
        }

        window.onload = () => {
            populateBranchMenu();
        };
    </script>
</head>
<body>
    <nav>
        <button id="branchButton">
            <svg class="octicon git-branch" aria-hidden="true" version="1.1" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M8.5 0a.5.5 0 0 1 .5.5V4h3a.5.5 0 0 1 0 1h-3v3h3a.5.5 0 0 1 0 1h-3v4.5a.5.5 0 0 1-1 0V8H5.5a.5.5 0 0 1 0-1h3V4H5.5a.5.5 0 0 1 0-1h3V.5a.5.5 0 0 1 .5-.5z"/></svg>
            Branch
        </button>
        <select id="branchMenu" class="hidden"></select>
    </nav>
</body>
</html>
